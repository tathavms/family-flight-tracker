<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Flight Deck — Family Dashboard</title>
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="Private family dashboard: world clocks, live flight tracker, and location sharing.">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Leaflet (maps) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============ Optional family passcode gate (disabled unless set in app.js) ============ -->
<div id="gate" class="gate hidden">
  <div class="gate-card">
    <p class="eyebrow">Family only</p>
    <h2>Enter the family passcode</h2>
    <input id="gate-input" type="password" inputmode="text" autocomplete="off" placeholder="Passcode">
    <button id="gate-submit" class="btn btn-amber">Unlock</button>
    <p id="gate-error" class="gate-error hidden">That's not it — try again.</p>
  </div>
</div>

<div id="app" class="app hidden">

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">✈</span>
      <div>
        <h1>Flight Deck</h1>
        <p class="subtitle">Family dashboard</p>
      </div>
    </div>
    <div class="format-toggle" role="group" aria-label="Clock format">
      <button id="fmt-12" class="fmt-btn" data-fmt="12">12H</button>
      <button id="fmt-24" class="fmt-btn" data-fmt="24">24H</button>
    </div>
  </header>

  <main>

    <!-- ============ Section 1: World clocks ============ -->
    <section class="section" aria-labelledby="clocks-heading">
      <div class="section-head">
        <h2 id="clocks-heading">World clocks</h2>
        <span id="sync-badge" class="sync-badge">Syncing time…</span>
      </div>
      <div class="clocks">
        <article class="clock-card" id="clock-ist">
          <p class="clock-zone">IST · India</p>
          <p class="clock-time" id="time-ist">--:--:--</p>
          <p class="clock-date" id="date-ist">—</p>
        </article>
        <article class="clock-card" id="clock-clt">
          <p class="clock-zone">Charlotte, USA</p>
          <p class="clock-time" id="time-clt">--:--:--</p>
          <p class="clock-date" id="date-clt">—</p>
        </article>
      </div>
    </section>
    <!-- ============ Section 3: Family location sharing ============ -->
    <section class="section" aria-labelledby="map-heading">
      <div class="section-head">
        <h2 id="map-heading">Family location</h2>
      </div>

      <div class="share-controls">
        <input id="share-name" type="text" placeholder="Your name" maxlength="24">
        <button id="share-btn" class="btn btn-teal">Share my location</button>
      </div>
      <p id="share-status" class="share-status"></p>

      <div id="family-map" class="family-map"></div>

      <ul id="sharers-list" class="sharers-list"></ul>
    </section>

  </main>

  <footer class="foot">
    <p>Private family page · not indexed · positions clear automatically when sharing stops</p>
  </footer>

</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module" src="app.js"></script>
</body>
</html>
